<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI Dashboard</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
margin:0;
}

.header{
background:#0f172a;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
background:#ef4444;
padding:10px 20px;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.container{
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#0f172a;
padding:25px;
border-radius:12px;
text-align:center;
}

.number{
font-size:22px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>Madaris AI Dashboard</h2>

<button class="logout" onclick="logout()">تسجيل الخروج</button>

</div>

<div class="container">

<h2>لوحة التحكم الرئيسية</h2>

<div class="cards">

<div class="card">
<div>الطلاب</div>
<div class="number">1,240</div>
</div>

<div class="card">
<div>المعلمين</div>
<div class="number">86</div>
</div>

<div class="card">
<div>المدارس</div>
<div class="number">14</div>
</div>

<div class="card">
<div>الدروس</div>
<div class="number">342</div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",

authDomain: "madaris-ai.firebaseapp.com",

projectId: "madaris-ai",

storageBucket: "madaris-ai.firebasestorage.app",

messagingSenderId: "915394447224",

appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d",

measurementId: "G-SC7VE6F20S"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

if (!user) {

window.location.href = "/app/login.html";

}

});

window.logout = function(){

signOut(auth).then(() => {

window.location.href = "/app/login.html";

});

}

</script>
<script type="module" src="./core/bootstrap.js"></script>
  
</body>

</html>
