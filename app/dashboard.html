<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madaris AI | لوحة التحكم</title>

<script>
if(!localStorage.getItem("madaris_logged_in")){
window.location.href="login.html"
}
</script>

<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

<style>

body{
margin:0;
font-family:"Tajawal",sans-serif;
background:#071120;
color:white;
}

.header{
padding:20px;
background:#0b1930;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:#0b1930;
padding:20px;
border-radius:15px;
}

.logout{
background:#ff4d4d;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
color:white;
}

@media(max-width:900px){
.cards{
grid-template-columns:1fr 1fr;
}
}

</style>

</head>

<body>

<div class="header">
<h2>Madaris AI Dashboard</h2>

<button class="logout" onclick="logout()">
تسجيل الخروج
</button>

</div>

<div class="container">

<h1>لوحة التحكم الرئيسية</h1>

<div class="cards">

<div class="card">
<h3>الطلاب</h3>
<p>1,240</p>
</div>

<div class="card">
<h3>المعلمين</h3>
<p>86</p>
</div>

<div class="card">
<h3>المدارس</h3>
<p>14</p>
</div>

<div class="card">
<h3>الدروس</h3>
<p>342</p>
</div>

</div>

</div>

<script>

function logout(){
localStorage.removeItem("madaris_logged_in")
window.location.href="login.html"
}

</script>

</body>
</html>
