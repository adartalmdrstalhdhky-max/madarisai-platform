<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | المعلم</title>

<script>
if(!localStorage.getItem("madaris_logged_in")){
window.location.href="../login.html"
}
</script>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">

<style>

body{
margin:0;
font-family:"Tajawal",sans-serif;
background:#071120;
color:white;
}

.header{
background:#0b1930;
padding:20px;
display:flex;
justify-content:space-between;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#0b1930;
padding:25px;
border-radius:15px;
}

.logout{
background:#ff4d4d;
padding:10px 15px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="header">

<h2>لوحة المعلم</h2>

<button class="logout" onclick="logout()">
تسجيل الخروج
</button>

</div>

<div class="container">

<h1>لوحة تحكم المعلم</h1>

<div class="grid">

<div class="card">
<h3>الطلاب</h3>
<p>إدارة الطلاب</p>
</div>

<div class="card">
<h3>الدروس</h3>
<p>إدارة الدروس</p>
</div>

<div class="card">
<h3>الاختبارات</h3>
<p>إدارة الاختبارات</p>
</div>

<div class="card">
<h3>الحضور</h3>
<p>تسجيل الحضور</p>
</div>

<div class="card">
<h3>النتائج</h3>
<p>عرض النتائج</p>
</div>

<div class="card">
<h3>التقارير</h3>
<p>تقارير المعلم</p>
</div>

</div>

</div>

<script>

function logout(){
localStorage.removeItem("madaris_logged_in")
window.location.href="../login.html"
}

</script>

</body>

</html>
