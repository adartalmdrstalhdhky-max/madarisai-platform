<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | لوحة الطالب</title>

<script>

/* التحقق من تسجيل الدخول */

if(!localStorage.getItem("madaris_logged_in")){
window.location.href="../login.html"
}

/* التحقق من الدور */

if(localStorage.getItem("madaris_role")!=="student"){
window.location.href="../login.html"
}

</script>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">

<style>

body{
margin:0;
font-family:"Tajawal",sans-serif;
background:#071120;
color:white;
}

.header{
background:#0b1930;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:600;
}

.container{
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat{
background:#0b1930;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
margin:0;
color:#00d4ff;
}

.stat p{
opacity:.7;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#0b1930;
padding:25px;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
background:#0f2242;
}

.logout{
background:#ff4d4d;
border:none;
padding:10px 15px;
border-radius:8px;
color:white;
cursor:pointer;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
Madaris AI | الطالب
</div>

<button class="logout" onclick="logout()">
تسجيل الخروج
</button>

</div>

<div class="container">

<h1>لوحة الطالب</h1>

<div class="stats">

<div class="stat">
<h2>8</h2>
<p>الدروس</p>
</div>

<div class="stat">
<h2>5</h2>
<p>الواجبات</p>
</div>

<div class="stat">
<h2>87%</h2>
<p>المعدل</p>
</div>

<div class="stat">
<h2>6</h2>
<p>المواد</p>
</div>

</div>

<div class="grid">

<div class="card" onclick="goLessons()">
<h3>الدروس</h3>
<p>عرض جميع الدروس</p>
</div>

<div class="card" onclick="goAssignments()">
<h3>الواجبات</h3>
<p>عرض الواجبات</p>
</div>

<div class="card" onclick="goResults()">
<h3>النتائج</h3>
<p>عرض النتائج</p>
</div>

<div class="card">
<h3>المعلم الذكي</h3>
<p>AI Teacher</p>
</div>

<div class="card">
<h3>التقدم الدراسي</h3>
<p>مستوى التقدم</p>
</div>

<div class="card">
<h3>الإعدادات</h3>
<p>إدارة الحساب</p>
</div>

</div>

</div>

<script>

function logout(){
localStorage.removeItem("madaris_logged_in")
localStorage.removeItem("madaris_role")
window.location.href="../login.html"
}

function goLessons(){
window.location.href="lessons.html"
}

function goAssignments(){
window.location.href="assignments.html"
}

function goResults(){
window.location.href="results.html"
}

</script>

</body>

</html>
