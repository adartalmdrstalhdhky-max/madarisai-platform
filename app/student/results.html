<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | نتائج الطالب</title>

<script>
if(!localStorage.getItem("madaris_logged_in")){
window.location.href="../login.html"
}

if(localStorage.getItem("madaris_role")!=="student"){
window.location.href="../login.html"
}
</script>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">

<style>

body{
margin:0;
font-family:"Tajawal",sans-serif;
background:#071120;
color:white;
}

.header{
background:#0b1930;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:600;
}

.container{
padding:30px;
}

.toolbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:24px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.back{
background:#00d4ff;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.logout{
background:#ff4d4d;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:28px;
}

.stat{
background:#0b1930;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
margin:0;
font-size:28px;
color:#00d4ff;
}

.stat p{
margin:6px 0 0 0;
opacity:.75;
}

.results-table{
background:#0b1930;
border-radius:18px;
padding:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th, td{
padding:14px 12px;
text-align:right;
border-bottom:1px solid rgba(255,255,255,.08);
}

th{
color:#8fe8ff;
font-weight:700;
font-size:14px;
}

td{
font-size:14px;
}

.grade{
font-weight:700;
}

.grade.excellent{
color:#6ee7a3;
}

.grade.good{
color:#8fe8ff;
}

.grade.average{
color:#ffd666;
}

.grade.low{
color:#ff9a9a;
}

.summary-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:24px;
}

.summary-card{
background:#0b1930;
padding:22px;
border-radius:15px;
}

.summary-card h3{
margin:0 0 12px 0;
}

.summary-card p{
margin:0;
opacity:.8;
line-height:1.8;
}

@media(max-width:900px){
.stats{
grid-template-columns:1fr 1fr;
}

.summary-grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
Madaris AI | النتائج
</div>

<div class="actions">
<button class="back" onclick="goBack()">رجوع</button>
<button class="logout" onclick="logout()">خروج</button>
</div>

</div>
