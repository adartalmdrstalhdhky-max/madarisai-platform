<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | تسجيل الدخول</title>

<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

<style>

body{
margin:0;
font-family:"Tajawal",sans-serif;
background:linear-gradient(135deg,#071120,#0b1930);
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
background:#0b1930;
padding:40px;
border-radius:15px;
width:400px;
max-width:90%;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
margin:0;
font-size:28px;
color:#00d4ff;
}

.input{
margin-bottom:20px;
}

.input label{
display:block;
margin-bottom:8px;
}

.input input,
.input select{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#071120;
color:white;
}

.button{
background:#00d4ff;
border:none;
padding:14px;
width:100%;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.button:hover{
opacity:.9;
}

.footer{
text-align:center;
margin-top:20px;
opacity:.6;
font-size:13px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
<h1>Madaris AI</h1>
<p>منصة التعليم الذكي</p>
</div>

<form onsubmit="return login()">

<div class="input">
<label>البريد الإلكتروني</label>
<input type="email" required>
</div>

<div class="input">
<label>كلمة المرور</label>
<input type="password" required>
</div>

<div class="input">
<label>نوع الحساب</label>
<select id="role">

<option value="student">طالب</option>

<option value="teacher">معلم</option>

<option value="school">إدارة مدرسة</option>

<option value="admin">الإدارة العليا</option>

</select>

</div>

<button class="button" type="submit">
تسجيل الدخول
</button>

</form>

<div class="footer">
Madaris AI © 2026
</div>

</div>

<script>

function login(){

let role=document.getElementById("role").value

localStorage.setItem("madaris_logged_in","true")
localStorage.setItem("madaris_role",role)

if(role==="student"){
window.location.href="student/index.html"
}

if(role==="teacher"){
window.location.href="teacher/index.html"
}

if(role==="school"){
window.location.href="school/index.html"
}

if(role==="admin"){
window.location.href="admin/index.html"
}

return false

}

</script>

</body>

</html>
