<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madaris AI | تسجيل الدخول</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#020617;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
      box-sizing:border-box;
    }

    .box{
      width:100%;
      max-width:420px;
      background:#0f172a;
      padding:24px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      box-sizing:border-box;
    }

    h2{
      margin:0 0 18px;
      font-size:32px;
      text-align:center;
    }

    p{
      margin:0 0 18px;
      text-align:center;
      opacity:.8;
    }

    input{
      width:100%;
      box-sizing:border-box;
      margin-bottom:12px;
      padding:12px;
      border:none;
      border-radius:10px;
      font-size:16px;
      background:#e5e7eb;
      color:#111827;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      margin-top:4px;
    }

    .link{
      display:block;
      text-align:center;
      margin-top:14px;
      color:#60a5fa;
      text-decoration:none;
      font-size:16px;
    }

    #msg{
      margin-top:14px;
      text-align:center;
      line-height:1.8;
      font-size:15px;
      color:#fbbf24;
      word-break:break-word;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Madaris AI</h2>
    <p>تسجيل الدخول إلى المنصة</p>

    <input type="email" id="email" placeholder="البريد الإلكتروني" />
    <input type="password" id="password" placeholder="كلمة المرور" />

    <button onclick="loginUser()">تسجيل الدخول</button>

    <a class="link" href="/app/register.html">إنشاء حساب جديد</a>

    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
      authDomain: "madaris-ai.firebaseapp.com",
      projectId: "madaris-ai",
      storageBucket: "madaris-ai.firebasestorage.app",
      messagingSenderId: "915394447224",
      appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d",
      measurementId: "G-SC7VE6F20S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showMessage(text){
      document.getElementById("msg").textContent = text;
    }

    function clearSession(){
      localStorage.removeItem("madaris_logged_in");
      localStorage.removeItem("madaris_role");
      localStorage.removeItem("madaris_uid");
      localStorage.removeItem("madaris_name");
      localStorage.removeItem("madaris_email");
      localStorage.removeItem("madaris_school_id");
      localStorage.removeItem("schoolId");
    }

    async function routeByRole(uid){
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);

      if(!userSnap.exists()){
        clearSession();
        await signOut(auth);
        showMessage("لم يتم العثور على بيانات المستخدم في قاعدة البيانات.");
        return;
      }

      const userData = userSnap.data();
      const role = userData.role || "";
      const schoolId = userData.schoolId || "";

      localStorage.setItem("madaris_logged_in", "true");
      localStorage.setItem("madaris_role", role);
      localStorage.setItem("madaris_uid", uid);
      localStorage.setItem("madaris_name", userData.name || "");
      localStorage.setItem("madaris_email", userData.email || "");
      localStorage.setItem("madaris_school_id", schoolId);
      localStorage.setItem("schoolId", schoolId);

      if(role === "admin"){
        window.location.href = "/app/admin/index.html";
        return;
      }

      if(role === "school"){
        window.location.href = "/app/school/index.html";
        return;
      }

      if(role === "teacher"){
        window.location.href = "/app/teacher/index.html";
        return;
      }

      if(role === "student"){
        window.location.href = "/app/student/index.html";
        return;
      }

      window.location.href = "/app/dashboard.html";
    }

    window.loginUser = async function(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if(!email || !password){
        showMessage("يرجى إدخال البريد الإلكتروني وكلمة المرور.");
        return;
      }

      try{
        clearSession();

        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        showMessage("تم تسجيل الدخول بنجاح. جاري تحويلك...");
        await routeByRole(userCredential.user.uid);

      }catch(error){
        clearSession();
        showMessage("خطأ: " + error.message);
      }
    };
  </script>

</body>
</html>
