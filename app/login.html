<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madaris AI | تسجيل الدخول</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #07142f 0%, #03122a 100%);
      color: #fff;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: linear-gradient(180deg, #214aa4 0%, #102e79 100%);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .subtitle {
      text-align: center;
      color: #89e7ff;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .text {
      text-align: center;
      color: #dce7ff;
      line-height: 1.95;
      font-size: 17px;
    }
    .section-title {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 18px;
    }
    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 17px;
      font-weight: 700;
    }
    .input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 20px;
      padding: 18px;
      font-size: 19px;
      margin-bottom: 16px;
      outline: none;
    }
    .input::placeholder { color: rgba(255,255,255,.55); }
    .input:focus { border-color: #65d7f7; }
    .btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 18px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-login {
      background: linear-gradient(180deg, #65d7f7 0%, #4fc4ea 100%);
      color: #fff;
    }
    .btn-home {
      background: linear-gradient(180deg, #ff6f93 0%, #f45377 100%);
      color: #fff;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 14px;
    }
    .status-box {
      margin-top: 16px;
      background: rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      line-height: 1.9;
      color: #dbe7ff;
      font-size: 15px;
    }
    .hint {
      text-align: center;
      margin-top: 14px;
      color: #c9d8ff;
      line-height: 1.9;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <div class="title">Madaris AI</div>
      <div class="subtitle">منصة المدرسة الذكية</div>
      <div class="text">
        تسجيل الدخول إلى المنصة بحسابك المعتمد.<br>
        بعد نجاح الدخول سيتم حفظ الجلسة محليًا ثم تحويلك
        تلقائيًا إلى صفحتك المناسبة.
      </div>
    </div>

    <div class="card">
      <div class="section-title">تسجيل الدخول</div>

      <label class="label" for="email">البريد الإلكتروني</label>
      <input id="email" class="input" type="email" placeholder="مثال: info@madarisai.com" autocomplete="username">

      <label class="label" for="password">كلمة المرور</label>
      <input id="password" class="input" type="password" placeholder="أدخل كلمة المرور" autocomplete="current-password">

      <button id="loginBtn" class="btn btn-login" type="button">تسجيل الدخول</button>

      <a class="btn btn-home" href="../index.html">رجوع إلى الرئيسية</a>

      <div id="loginStatus" class="status-box">
        بانتظار إدخال البريد وكلمة المرور.
      </div>

      <div class="hint">
        هذه الصفحة لا تقوم بتحويلك تلقائيًا إلا إذا كانت هناك
        جلسة صحيحة محفوظة بالفعل.
      </div>
    </div>

  </div>

  <script type="module" src="./login.js"></script>
</body>
</html>
