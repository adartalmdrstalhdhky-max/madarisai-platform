<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | تسجيل الدخول</title>

<link rel="stylesheet" href="../assets/css/main.css">
<link rel="stylesheet" href="../assets/css/responsive.css">

<style>

body {
margin:0;
padding:0;
font-family: "Tajawal", sans-serif;
background: linear-gradient(135deg,#0a0f2c,#0f1b4c);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.login-container {
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.logo {
text-align:center;
margin-bottom:30px;
}

.logo h1 {
margin:0;
font-size:28px;
font-weight:700;
}

.logo span {
color:#00d4ff;
}

.input-group {
margin-bottom:20px;
}

.input-group label {
display:block;
margin-bottom:8px;
font-size:14px;
opacity:0.8;
}

.input-group input {
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
outline:none;
}

.input-group input:focus {
border:1px solid #00d4ff;
}

.login-btn {
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00d4ff,#0066ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover {
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.options {
margin-top:20px;
display:flex;
justify-content:space-between;
font-size:13px;
opacity:0.8;
}

.options a {
color:#00d4ff;
text-decoration:none;
}

.footer {
text-align:center;
margin-top:30px;
font-size:12px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">
<h1>Madaris <span>AI</span></h1>
<p>منصة التعليم الذكي</p>
</div>

<form>

<div class="input-group">
<label>البريد الإلكتروني</label>
<input type="email" placeholder="example@email.com">
</div>

<div class="input-group">
<label>كلمة المرور</label>
<input type="password" placeholder="********">
</div>

<button class="login-btn" type="submit">
تسجيل الدخول
</button>

</form>

<div class="options">
<a href="#">نسيت كلمة المرور؟</a>
<a href="#">إنشاء حساب</a>
</div>

<div class="footer">
Madaris AI © 2026
</div>

</div>

</body>

</html>
