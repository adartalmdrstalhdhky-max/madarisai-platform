<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Madaris AI | تسجيل الدخول</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #020617;
      --bg-2: #031a4a;
      --card: rgba(10, 26, 74, 0.94);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #fb7185;
      --danger-hover: #f43f5e;
      --input-bg: rgba(255, 255, 255, 0.92);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --radius-xl: 28px;
      --radius-lg: 20px;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: "Tahoma", "Arial", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), transparent 28%),
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-1) 0%, #021038 38%, #031a4a 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .page-shell {
      width: 100%;
      max-width: 560px;
    }

    .login-card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 34px 22px 26px;
      backdrop-filter: blur(12px);
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand h1 {
      font-size: 2.3rem;
      line-height: 1.2;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    .brand p {
      font-size: 1.3rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .status-box {
      display: none;
      margin-bottom: 18px;
      border-radius: 18px;
      padding: 14px 16px;
      line-height: 1.8;
      font-size: 1rem;
      border: 1px solid transparent;
    }

    .status-box.show {
      display: block;
    }

    .status-box.error {
      background: rgba(127, 29, 29, 0.35);
      color: #fecaca;
      border-color: rgba(251, 113, 133, 0.25);
    }

    .status-box.success {
      background: rgba(20, 83, 45, 0.35);
      color: #bbf7d0;
      border-color: rgba(74, 222, 128, 0.2);
    }

    .field-group {
      margin-bottom: 16px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: #dbeafe;
      font-size: 1rem;
      font-weight: 700;
    }

    .input {
      width: 100%;
      height: 72px;
      border: none;
      outline: none;
      border-radius: var(--radius-lg);
      background: var(--input-bg);
      color: #0f172a;
      font-size: 1.15rem;
      padding: 0 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .input::placeholder {
      color: #64748b;
      font-size: 1rem;
    }

    .input:focus {
      box-shadow:
        0 0 0 3px rgba(96, 165, 250, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .btn {
      width: 100%;
      min-height: 74px;
      border: none;
      outline: none;
      border-radius: 24px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-primary {
      margin-top: 10px;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #4b8df7 0%, #1d4ed8 100%);
    }

    .btn-secondary {
      margin-top: 14px;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .helper-links {
      margin-top: 18px;
      text-align: center;
    }

    .helper-links a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .helper-links a:hover {
      text-decoration: underline;
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.9;
    }

    .loading-row {
      display: none;
      margin-top: 14px;
      text-align: center;
      color: #cbd5e1;
      font-size: 1rem;
    }

    .loading-row.show {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 12px;
      }

      .login-card {
        padding: 28px 16px 22px;
        border-radius: 24px;
      }

      .brand h1 {
        font-size: 2rem;
      }

      .brand p {
        font-size: 1.15rem;
      }

      .input {
        height: 68px;
        font-size: 1.08rem;
      }

      .btn {
        min-height: 70px;
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="login-card">
      <div class="brand">
        <h1>Madaris AI</h1>
        <p>تسجيل الدخول إلى المنصة</p>
      </div>

      <div id="statusBox" class="status-box" aria-live="polite"></div>

      <form id="loginForm">
        <div class="field-group">
          <label class="field-label" for="email">البريد الإلكتروني</label>
          <input
            id="email"
            name="email"
            class="input"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="البريد الإلكتروني"
            required
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="password">كلمة المرور</label>
          <input
            id="password"
            name="password"
            class="input"
            type="password"
            autocomplete="current-password"
            placeholder="كلمة المرور"
            required
          />
        </div>

        <button id="loginBtn" type="submit" class="btn btn-primary">
          تسجيل الدخول
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          onclick="window.location.href='../index.html'"
        >
          رجوع إلى الرئيسية
        </button>

        <div id="loadingRow" class="loading-row">جارٍ تسجيل الدخول...</div>

        <div class="helper-links">
          <a href="register.html">إنشاء حساب جديد</a>
        </div>

        <div class="footer-note">
          بعد نجاح تسجيل الدخول سيتم حفظ الجلسة محليًا ثم تحويلك تلقائيًا إلى صفحتك المناسبة.
        </div>
      </form>
    </section>
  </main><script type="module" src="./login.js"></script>

  <script>
    (function () {
      const form = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const statusBox = document.getElementById("statusBox");
      const loadingRow = document.getElementById("loadingRow");

      function showStatus(message, type = "error") {
        statusBox.textContent = message;
        statusBox.className = "status-box show " + type;
      }

      function clearStatus() {
        statusBox.textContent = "";
        statusBox.className = "status-box";
      }

      function setLoading(isLoading) {
        loginBtn.disabled = isLoading;
        loginBtn.style.opacity = isLoading ? "0.75" : "1";
        loadingRow.className = isLoading ? "loading-row show" : "loading-row";
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        clearStatus();
        setLoading(true);

        try {
          if (typeof window.loginUser !== "function") {
            throw new Error("ملف login.js لم يتم تحميله بشكل صحيح.");
          }

          await window.loginUser();
        } catch (error) {
          console.error("Login form error:", error);
          showStatus(error?.message || "حدث خطأ أثناء تسجيل الدخول.");
        } finally {
          setLoading(false);
        }
      });

      window.addEventListener("error", function (event) {
        console.error("Global page error:", event.error || event.message);
      });
    })();
  </script>
</body>
</html>
