<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | تسجيل الدخول</title>

<link rel="stylesheet" href="../assets/css/main.css">

<style>

body{
margin:0;
background:#071120;
color:white;
font-family:Tajawal,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#0b1930;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#071120;
color:white;
}

button{
width:100%;
padding:12px;
background:#00d4ff;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Madaris AI</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">تسجيل الدخول</button>

<br><br>

<button onclick="register()">إنشاء حساب</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.firebasestorage.app",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d",
measurementId: "G-SC7VE6F20S"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{

window.location.href="dashboard.html";

})
.catch((error)=>{

alert("خطأ في تسجيل الدخول");

})

}


window.register = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{

alert("تم إنشاء الحساب");

})
.catch((error)=>{

alert("خطأ في إنشاء الحساب");

})

}

</script>

</body>

</html>
