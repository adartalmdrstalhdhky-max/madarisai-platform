<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | لوحة المعلم</title>

<script>

/* التحقق من تسجيل الدخول */

if(!localStorage.getItem("madaris_logged_in")){
window.location.href="../login.html"
}

/* التحقق من الدور */

if(localStorage.getItem("madaris_role")!=="teacher"){
window.location.href="../login.html"
}

</script>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">

<style>

body{
margin:0;
font-family:"Tajawal",sans-serif;
background:#071120;
color:white;
}

.header{
background:#0b1930;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:600;
}

.container{
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat{
background:#0b1930;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
margin:0;
color:#00d4ff;
}

.stat p{
opacity:.7;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#0b1930;
padding:25px;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
background:#0f2242;
}

.logout{
background:#ff4d4d;
border:none;
padding:10px 15px;
border-radius:8px;
color:white;
cursor:pointer;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
Madaris AI | المعلم
</div>

<button class="logout" onclick="logout()">
تسجيل الخروج
</button>

</div>

<div class="container">

<h1>لوحة تحكم المعلم</h1>

<div class="stats">

<div class="stat">
<h2>120</h2>
<p>عدد الطلاب</p>
</div>

<div class="stat">
<h2>5</h2>
<p>الفصول</p>
</div>

<div class="stat">
<h2>12</h2>
<p>الدروس</p>
</div>

<div class="stat">
<h2>3</h2>
<p>الاختبارات</p>
</div>

</div>

<div class="grid">

<div class="card">
<h3>إدارة الطلاب</h3>
<p>عرض الطلاب</p>
</div>

<div class="card">
<h3>الدروس</h3>
<p>إدارة الدروس</p>
</div>

<div class="card">
<h3>الاختبارات</h3>
<p>إدارة الاختبارات</p>
</div>

<div class="card">
<h3>الحضور</h3>
<p>تسجيل الحضور</p>
</div>

<div class="card">
<h3>الواجبات</h3>
<p>إدارة الواجبات</p>
</div>

<div class="card">
<h3>التقارير</h3>
<p>تقارير المعلم</p>
</div>

</div>

</div>

<script>

function logout(){

localStorage.removeItem("madaris_logged_in")
localStorage.removeItem("madaris_role")

window.location.href="../login.html"

}

</script>

</body>

</html>
