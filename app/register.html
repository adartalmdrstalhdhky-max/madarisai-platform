<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل حساب - Madaris AI</title>

<style>
body{
font-family:Arial;
background:#0b0f1a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#12182b;
padding:25px;
border-radius:10px;
width:300px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>إنشاء حساب</h2>

<input type="text" id="name" placeholder="الاسم الكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<select id="role">
<option value="student">طالب</option>
<option value="teacher">معلم</option>
<option value="school">مدرسة</option>
</select>

<button onclick="register()">إنشاء حساب</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.firebasestorage.app",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d",
measurementId: "G-SC7VE6F20S"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.register = async function(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const role = document.getElementById("role").value;

try{

await addDoc(collection(db,"users"),{
name:name,
email:email,
password:password,
role:role,
created:new Date()
});

alert("تم إنشاء الحساب بنجاح");

window.location.href="login.html";

}catch(error){

alert("خطأ: "+error.message);

}

}

</script>

</body>
</html>
