<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madaris AI | إنشاء حساب</title>
  <meta name="theme-color" content="#07111f" />

  <style>
    :root{
      --bg:#07111f;
      --panel:#0d1a2d;
      --border:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:#8ab3c7;
      --primary:#85fdff;
      --radius:22px;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
      font-family:
        "Tajawal",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Arial,
        sans-serif;
      background:
        radial-gradient(circle at top right, rgba(133,253,255,.08), transparent 24%),
        linear-gradient(180deg, #07111f 0%, #081728 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      line-height:1.9;
    }

    .card{
      width:min(720px, 100%);
      background:rgba(13,26,45,.92);
      border:1px solid var(--border);
      border-radius:32px;
      padding:32px 22px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    h1{
      margin:0 0 14px;
      font-size:clamp(30px, 5vw, 52px);
      line-height:1.1;
      font-weight:900;
    }

    p{
      margin:0 0 18px;
      color:var(--muted);
      font-size:18px;
    }

    .note{
      margin-top:18px;
      padding:16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      color:#dfeaf4;
      font-size:16px;
    }

    .actions{
      margin-top:24px;
      display:grid;
      gap:14px;
    }

    a{
      text-decoration:none;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:64px;
      border-radius:999px;
      font-size:20px;
      font-weight:900;
      transition:.2s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg, #85fdff, #67d8ff);
      color:#07111f;
    }

    .btn-secondary{
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      color:#fff;
    }

    .btn:hover{
      transform:translateY(-1px);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>إنشاء الحساب متوقف مؤقتًا</h1>

    <p>
      تم إيقاف صفحة التسجيل مؤقتًا حتى استعادة استقرار المنصة
      وتفادي أي تعارض مع نظام الدخول الحالي.
    </p>

    <div class="note">
      إذا كان لديك حساب سابق، استخدم صفحة تسجيل الدخول المعتادة.
      أما إنشاء الحسابات الجديدة فسيُعاد تفعيله بعد تثبيت المنصة.
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="/app/login.html">العودة إلى تسجيل الدخول</a>
      <a class="btn btn-secondary" href="/">العودة إلى الموقع الرئيسي</a>
    </div>
  </div>

</body>
</html>
