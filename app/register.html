<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madaris AI | إنشاء حساب</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#020617;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .box{
      width:320px;
      background:#0f172a;
      padding:24px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    h2{
      margin:0 0 18px;
      font-size:32px;
      text-align:center;
    }

    p{
      margin:0 0 18px;
      text-align:center;
      opacity:.8;
    }

    input, select{
      width:100%;
      box-sizing:border-box;
      margin-bottom:12px;
      padding:12px;
      border:none;
      border-radius:10px;
      font-size:16px;
      background:#e5e7eb;
      color:#111827;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      margin-top:4px;
    }

    .link{
      display:block;
      text-align:center;
      margin-top:14px;
      color:#60a5fa;
      text-decoration:none;
      font-size:16px;
    }

    #msg{
      margin-top:14px;
      text-align:center;
      line-height:1.7;
      font-size:15px;
      color:#fbbf24;
      word-break:break-word;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Madaris AI</h2>
    <p>إنشاء حساب جديد</p>

    <input type="text" id="name" placeholder="الاسم الكامل">
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">

    <select id="role">
      <option value="student">طالب</option>
      <option value="teacher">معلم</option>
      <option value="school">مدرسة</option>
      <option value="admin">إدارة</option>
    </select>

    <button onclick="registerUser()">إنشاء حساب</button>

    <a class="link" href="/app/login.html">لديك حساب؟ تسجيل الدخول</a>

    <div id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
      authDomain: "madaris-ai.firebaseapp.com",
      projectId: "madaris-ai",
      storageBucket: "madaris-ai.firebasestorage.app",
      messagingSenderId: "915394447224",
      appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d",
      measurementId: "G-SC7VE6F20S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showMessage(text){
      document.getElementById("msg").textContent = text;
    }

    window.registerUser = async function () {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const role = document.getElementById("role").value;

      if(!name || !email || !password || !confirmPassword){
        showMessage("يرجى تعبئة جميع الحقول.");
        return;
      }

      if(password.length < 6){
        showMessage("كلمة المرور يجب أن تكون 6 أحرف أو أكثر.");
        return;
      }

      if(password !== confirmPassword){
        showMessage("كلمتا المرور غير متطابقتين.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await updateProfile(user, {
          displayName: name
        });

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          name: name,
          email: email,
          role: role,
          created: serverTimestamp()
        });

        showMessage("تم إنشاء الحساب بنجاح. سيتم تحويلك إلى تسجيل الدخول.");

        setTimeout(() => {
          window.location.href = "/app/login.html";
        }, 1200);

      } catch (error) {
        showMessage("خطأ: " + error.message);
      }
    };
  </script>

</body>
</html>
