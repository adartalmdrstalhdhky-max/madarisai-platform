<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Madaris AI | عرض الجدول</title>

<style>

body{
margin:0;
font-family:tahoma;
background:linear-gradient(180deg,#071a3a,#06142b);
color:white;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#0b2452;
padding:20px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
opacity:.8;
line-height:1.8;
}

.button{
display:block;
width:100%;
padding:16px;
margin-top:10px;
border-radius:30px;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{
background:#58c7e6;
color:white;
}

.btn-danger{
background:#ff5a7b;
color:white;
}

.schedule-day{
margin-bottom:20px;
}

.day-title{
font-size:22px;
margin-bottom:10px;
font-weight:bold;
}

.lesson{
background:#0f2f68;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.lesson-title{
font-size:18px;
font-weight:bold;
}

.lesson-meta{
opacity:.8;
margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
Madaris AI | عرض الجدول المدرسي
</div>

<div class="subtitle">
عرض الجدول الحالي للمدرسة
</div>

<h3 data-school-name>
جاري التحميل...
</h3>

<div>
schoolId :
<span data-school-id></span>
</div>

<button
class="button btn-primary"
onclick="location.href='index.html'">

رجوع للوحة المدرسة

</button>

<button
class="button btn-danger"
data-action="logout">

خروج

</button>

</div>


<div class="card">

<div class="title">
الجدول الأسبوعي
</div>

<div id="scheduleContainer">

جاري تحميل الجدول...

</div>

</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.firebasestorage.app",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const days = [
"السبت",
"الأحد",
"الإثنين",
"الثلاثاء",
"الأربعاء",
"الخميس"
];


async function loadSchedule(){

const session =
window.MadarisSchoolSession.getSchoolSession();

if(!session){

document.getElementById(
"scheduleContainer"
).innerHTML="لا توجد جلسة مدرسة";

return;

}

const schoolId = session.schoolId;

const q =
query(
collection(db,"schedule"),
where("schoolId","==",schoolId),
orderBy("day"),
orderBy("period")
);

const snapshot = await getDocs(q);

const grouped = {};

snapshot.forEach(doc=>{

const data = doc.data();

if(!grouped[data.day]){

grouped[data.day]=[];

}

grouped[data.day].push(data);

});

renderSchedule(grouped);

}function renderSchedule(grouped){

const container =
document.getElementById(
"scheduleContainer"
);

container.innerHTML="";

days.forEach(day=>{

if(!grouped[day]) return;

const dayDiv =
document.createElement("div");

dayDiv.className="schedule-day";

dayDiv.innerHTML=`
<div class="day-title">
${day}
</div>
`;

grouped[day].forEach(lesson=>{

const teacher =
lesson.teacherName ||
(lesson.teacherType=="ai"
? "المعلم الذكي"
: "—");

const el =
document.createElement("div");

el.className="lesson";

el.innerHTML=`

<div class="lesson-title">
${lesson.subjectName}
</div>

<div class="lesson-meta">
الصف: ${lesson.className}
</div>

<div class="lesson-meta">
المعلم: ${teacher}
</div>

<div class="lesson-meta">
${lesson.startTime}
-
${lesson.endTime}
</div>

`;

dayDiv.appendChild(el);

});

container.appendChild(dayDiv);

});

}

loadSchedule();

</script>


<script src="./session-guard.js"></script>
<script src="./session-guard.js"></script>
</body>

</html>
