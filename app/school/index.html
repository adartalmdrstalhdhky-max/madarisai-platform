<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة المدرسة | Madaris AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0b1220;
color:white;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:22px;
font-weight:700;
}

.logout{
background:#ef4444;
border:none;
padding:10px 18px;
border-radius:10px;
color:white;
cursor:pointer;
}

.container{
padding:25px;
max-width:1400px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:20px;
border-radius:16px;
border:1px solid rgba(255,255,255,.04);
}

.card h3{
font-size:14px;
opacity:.7;
margin-bottom:10px;
}

.card h2{
font-size:26px;
}

.section-title{
font-size:20px;
margin-bottom:20px;
margin-top:20px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.menu-card{
background:#111827;
padding:25px;
border-radius:18px;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.04);
}

.menu-card:hover{
transform:translateY(-3px);
background:#1f2937;
}

.menu-card h4{
font-size:18px;
margin-bottom:10px;
}

.menu-card p{
opacity:.6;
font-size:14px;
}

.loading{
text-align:center;
padding:40px;
opacity:.6;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">Madaris AI</div>
<button class="logout" id="logoutBtn">تسجيل الخروج</button>
</div>

<div class="container">

<div id="loading" class="loading">
جاري تحميل بيانات المدرسة...
</div>

<div id="content" style="display:none">

<div class="grid">

<div class="card">
<h3>اسم المدرسة</h3>
<h2 id="schoolName">-</h2>
</div>

<div class="card">
<h3>عدد الطلاب</h3>
<h2 id="studentsCount">0</h2>
</div>

<div class="card">
<h3>عدد المعلمين</h3>
<h2 id="teachersCount">0</h2>
</div>

<div class="card">
<h3>عدد الصفوف</h3>
<h2 id="classesCount">0</h2>
</div>

<div class="card">
<h3>عدد المواد</h3>
<h2 id="subjectsCount">0</h2>
</div>

<div class="card">
<h3>عدد الجداول</h3>
<h2 id="scheduleCount">0</h2>
</div>

</div>

<div class="section-title">
إدارة المدرسة
</div>

<div class="menu-grid">

<div class="menu-card" onclick="go('students.html')">
<h4>الطلاب</h4>
<p>إدارة الطلاب</p>
</div>

<div class="menu-card" onclick="go('staff.html')">
<h4>المعلمين</h4>
<p>إدارة المعلمين</p>
</div>

<div class="menu-card" onclick="go('classes.html')">
<h4>الصفوف</h4>
<p>إدارة الصفوف</p>
</div>

<div class="menu-card" onclick="go('schedule.html')">
<h4>الجدول</h4>
<p>الجدول الدراسي</p>
</div>

<div class="menu-card" onclick="go('manage-schedule.html')">
<h4>إدارة الجدول</h4>
<p>تنظيم الجدول</p>
</div>

<div class="menu-card" onclick="go('reports.html')">
<h4>التقارير</h4>
<p>تقارير المدرسة</p>
</div>

</div>

</div>

</div>

<script src="session-guard.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.appspot.com",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function go(page){
  window.location.href = page;
}

window.go = go;


document.getElementById("logoutBtn").addEventListener("click",()=>{

MadarisSession.logoutToLogin();

});


async function loadDashboard(){

try{

const session = MadarisSession.requireSchoolSession();

if(!session){
return;
}

const schoolId = session.schoolId;
const schoolName = session.schoolName;

document.getElementById("schoolName").textContent = schoolName || "مدرسة";


const studentsQuery = query(
collection(db,"students"),
where("schoolId","==",schoolId)
);

const teachersQuery = query(
collection(db,"teachers"),
where("schoolId","==",schoolId)
);

const classesQuery = query(
collection(db,"classes"),
where("schoolId","==",schoolId)
);

const subjectsQuery = query(
collection(db,"subjects"),
where("schoolId","==",schoolId)
);

const scheduleQuery = query(
collection(db,"schedules"),
where("schoolId","==",schoolId)
);


const [
studentsSnap,
teachersSnap,
classesSnap,
subjectsSnap,
scheduleSnap
] = await Promise.all([
getDocs(studentsQuery),
getDocs(teachersQuery),
getDocs(classesQuery),
getDocs(subjectsQuery),
getDocs(scheduleQuery)
]);


document.getElementById("studentsCount").textContent =
studentsSnap.size;

document.getElementById("teachersCount").textContent =
teachersSnap.size;

document.getElementById("classesCount").textContent =
classesSnap.size;

document.getElementById("subjectsCount").textContent =
subjectsSnap.size;

document.getElementById("scheduleCount").textContent =
scheduleSnap.size;


document.getElementById("loading").style.display="none";
document.getElementById("content").style.display="block";


}catch(error){

console.error(error);

document.getElementById("loading").innerHTML=
"حدث خطأ أثناء تحميل البيانات";

}

}


loadDashboard();

</script>

</body>
</html>
