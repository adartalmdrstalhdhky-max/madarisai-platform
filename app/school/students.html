<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الطلاب | Madaris AI</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0b1220;
color:white;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0f172a;
border-bottom:1px solid rgba(255,255,255,.05);
}

.back{
background:#2563eb;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
border:none;
color:white;
}

.container{
padding:25px;
max-width:1300px;
margin:auto;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.add-btn{
background:#10b981;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
color:white;
}

.search{
padding:12px;
border-radius:10px;
border:none;
width:280px;
background:#111827;
color:white;
}

.table{
background:#111827;
border-radius:16px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:1fr 1fr 1fr 120px;
padding:15px;
border-bottom:1px solid rgba(255,255,255,.04);
}

.header-row{
background:#0f172a;
font-weight:600;
}

.action-btn{
padding:6px 12px;
border-radius:6px;
border:none;
cursor:pointer;
}

.delete{
background:#ef4444;
color:white;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#0f172a;
padding:25px;
border-radius:16px;
width:400px;
}

.input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#111827;
color:white;
}

.save{
background:#2563eb;
padding:12px;
border:none;
width:100%;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<button class="back" onclick="goBack()">رجوع</button>

<h2>الطلاب</h2>

</div>

<div class="container">

<div class="top-bar">

<input type="text" id="search" class="search" placeholder="بحث عن طالب">

<button class="add-btn" onclick="openModal()">إضافة طالب</button>

</div>

<div class="table">

<div class="row header-row">

<div>اسم الطالب</div>
<div>الصف</div>
<div>رقم الطالب</div>
<div>إجراءات</div>

</div>

<div id="studentsList"></div>

</div>

</div>


<div class="modal" id="modal">

<div class="modal-box">

<h3>إضافة طالب</h3>

<input id="name" class="input" placeholder="اسم الطالب">
<input id="class" class="input" placeholder="الصف">
<input id="number" class="input" placeholder="رقم الطالب">

<button class="save" onclick="saveStudent()">حفظ</button>

</div>

</div>


<script src="session-guard.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.appspot.com",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


let schoolId = null;
let students = [];


function goBack(){
window.location.href="index.html";
}


window.openModal = function(){
document.getElementById("modal").style.display="flex";
}


window.closeModal = function(){
document.getElementById("modal").style.display="none";
}


window.saveStudent = async function(){

const name = document.getElementById("name").value.trim();
const className = document.getElementById("class").value.trim();
const number = document.getElementById("number").value.trim();

if(!name){
alert("ادخل اسم الطالب");
return;
}

await addDoc(collection(db,"students"),{

name:name,
class:className,
number:number,
schoolId:schoolId,
createdAt:Date.now()

});

closeModal();

loadStudents();

}


async function loadStudents(){

const q = query(
collection(db,"students"),
where("schoolId","==",schoolId)
);

const snapshot = await getDocs(q);

students = [];

snapshot.forEach(doc=>{

students.push({
id:doc.id,
...doc.data()
});

});

render();

}


function render(){

const container = document.getElementById("studentsList");

container.innerHTML="";

students.forEach(student=>{

const row = document.createElement("div");

row.className="row";

row.innerHTML = `

<div>${student.name || ""}</div>
<div>${student.class || ""}</div>
<div>${student.number || ""}</div>

<div>
<button class="action-btn delete"
onclick="deleteStudent('${student.id}')">
حذف
</button>
</div>

`;

container.appendChild(row);

});

}


window.deleteStudent = async function(id){

if(!confirm("حذف الطالب ؟")) return;

await deleteDoc(doc(db,"students",id));

loadStudents();

}


document.getElementById("search")
.addEventListener("input",function(){

const value = this.value.toLowerCase();

const filtered = students.filter(s=>
(s.name || "").toLowerCase().includes(value)
);

const container = document.getElementById("studentsList");

container.innerHTML="";

filtered.forEach(student=>{

const row = document.createElement("div");

row.className="row";

row.innerHTML = `

<div>${student.name || ""}</div>
<div>${student.class || ""}</div>
<div>${student.number || ""}</div>

<div>
<button class="action-btn delete"
onclick="deleteStudent('${student.id}')">
حذف
</button>
</div>

`;

container.appendChild(row);

});

});


function init(){

const session = MadarisSession.requireSchoolSession();

if(!session) return;

schoolId = session.schoolId;

loadStudents();

}

init();

</script>

</body>
</html>
