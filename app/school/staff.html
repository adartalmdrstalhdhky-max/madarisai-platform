<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | طاقم المدرسة</title>

<script>
if (!localStorage.getItem("madaris_logged_in")) {
  window.location.href = "../login.html";
}

if (localStorage.getItem("madaris_role") !== "school") {
  window.location.href = "../login.html";
}
</script>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/responsive.css">

<style>
body{
margin:0;
font-family:"Tajawal",sans-serif;
background:#071120;
color:white;
}

.header{
background:#0b1930;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.logo{
font-size:20px;
font-weight:600;
}

.header-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.back-btn,
.logout{
border:none;
padding:10px 16px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:700;
font-size:15px;
}

.back-btn{
background:#20c7ee;
}

.logout{
background:#ff4d4d;
}

.container{
padding:30px;
}

.top-section{
margin-bottom:25px;
}

.top-section h1{
margin:0;
font-size:32px;
}

.top-section p{
margin:10px 0 0 0;
opacity:.82;
line-height:1.9;
}

.loading-box{
background:#0b1930;
padding:18px;
border-radius:12px;
margin-bottom:20px;
color:#8fe8ff;
display:none;
}

.error-box{
background:rgba(255,77,77,.12);
border:1px solid rgba(255,77,77,.25);
padding:18px;
border-radius:12px;
margin-bottom:20px;
color:#ffb3b3;
display:none;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat{
background:#0b1930;
padding:24px;
border-radius:18px;
text-align:center;
}

.stat h2{
margin:0;
font-size:30px;
color:#00d4ff;
}

.table-card{
background:#0b1930;
border-radius:18px;
padding:24px;
margin-bottom:24px;
border:1px solid rgba(255,255,255,.05);
}

.staff-table{
width:100%;
border-collapse:collapse;
}

.staff-table th,
.staff-table td{
padding:18px 14px;
border-bottom:1px solid rgba(255,255,255,.08);
text-align:right;
}

.staff-type-badge,
.status-badge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-size:14px;
font-weight:700;
}

.staff-type-human{
background:rgba(64,140,255,.16);
color:#b9d7ff;
}

.staff-type-ai{
background:rgba(159,106,255,.18);
color:#d8c2ff;
}

.status-active{
background:rgba(46,204,113,.16);
color:#7ef0a7;
}

.status-inactive{
background:rgba(255,77,77,.12);
color:#ffb3b3;
}
</style>

</head>

<body>

<div class="header">
<div class="logo" id="staffHeaderTitle">Madaris AI | طاقم المدرسة</div>

<div class="header-actions">
<button class="back-btn" onclick="goBack()">رجوع</button>
<button class="logout" onclick="logout()">خروج</button>
</div>

</div>

<div class="container">

<div id="loadingBox" class="loading-box">جاري تحميل بيانات الطاقم...</div>
<div id="errorBox" class="error-box"></div>

<div class="top-section">
<h1 id="pageTitle">إدارة المعلمين والموظفين</h1>
</div>

<div class="stats">
<div class="stat">
<h2 id="totalTeachers">0</h2>
<p>إجمالي المعلمين</p>
</div>

<div class="stat">
<h2 id="humanTeachers">0</h2>
<p>المعلمون البشريون</p>
</div>

<div class="stat">
<h2 id="aiTeachers">0</h2>
<p>المعلمون الأذكياء</p>
</div>

<div class="stat">
<h2 id="activeTeachers">0</h2>
<p>النشطون</p>
</div>

</div>

<div class="table-card">

<h2>قائمة طاقم المدرسة</h2>

<table class="staff-table">

<thead>
<tr>
<th>الاسم</th>
<th>النوع</th>
<th>الدور</th>
<th>المادة</th>
<th>الصف</th>
<th>الحالة</th>
<th>البريد</th>
<th>الهاتف</th>
</tr>
</thead>

<tbody id="staffTableBody">
<tr>
<td colspan="8">لا توجد بيانات</td>
</tr>
</tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.firebasestorage.app",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const staffTableBody = document.getElementById("staffTableBody");


function normalizeTeacherType(teacher){

if (teacher.isAI === true || teacher.teacherType === "ai") {

return {
text:"معلم ذكي",
className:"staff-type-ai"
};

}

return {
text:"معلم بشري",
className:"staff-type-human"
};

}


function normalizeStatus(status){

if(status === "active"){
return {
text:"نشط",
className:"status-active"
};
}

return {
text:"غير نشط",
className:"status-inactive"
};

}



async function loadStaffPage(){

const uid = localStorage.getItem("madaris_uid");

const userRef = doc(db,"users",uid);
const userSnap = await getDoc(userRef);

const schoolId = userSnap.data().schoolId;


const teachersRef = collection(db,"teachers");

const q = query(teachersRef,where("schoolId","==",schoolId));

const querySnapshot = await getDocs(q);

const teachers=[];

querySnapshot.forEach(docSnap=>{
teachers.push({
id:docSnap.id,
...docSnap.data()
});
});


/* إصلاح عرض اسم المادة نهائياً */

for(const teacher of teachers){

if(teacher.subjectId){

const subjectRef = doc(db,"subjects",teacher.subjectId);

const subjectSnap = await getDoc(subjectRef);

if(subjectSnap.exists()){
teacher.subjectName = subjectSnap.data().name;
}else{
teacher.subjectName = teacher.subjectId;
}

}


if(teacher.classId){

const classRef = doc(db,"classes",teacher.classId);

const classSnap = await getDoc(classRef);

if(classSnap.exists()){
teacher.className = classSnap.data().name;
}else{
teacher.className = teacher.classId;
}

}

}



staffTableBody.innerHTML = teachers.map(teacher=>{

const typeInfo = normalizeTeacherType(teacher);
const statusInfo = normalizeStatus(teacher.status);

return `

<tr>

<td>${teacher.name || "-"}</td>

<td>
<span class="staff-type-badge ${typeInfo.className}">
${typeInfo.text}
</span>
</td>

<td>${teacher.role || "-"}</td>

<td>${teacher.subjectName || "-"}</td>

<td>${teacher.className || "-"}</td>

<td>
<span class="status-badge ${statusInfo.className}">
${statusInfo.text}
</span>
</td>

<td>${teacher.email || "-"}</td>

<td>${teacher.phone || "-"}</td>

</tr>

`;

}).join("");

}


window.goBack = function(){
window.location.href="index.html";
};


window.logout = function(){

localStorage.clear();

window.location.href="../login.html";

};


loadStaffPage();

</script>

</body>
</html>
