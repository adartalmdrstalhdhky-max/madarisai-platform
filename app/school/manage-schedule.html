<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madaris AI | إدارة الجدول</title>

<style>

body{
margin:0;
font-family:tahoma;
background:linear-gradient(180deg,#071a3a,#06142b);
color:white;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#0b2452;
padding:20px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
opacity:.8;
margin-bottom:15px;
}

.input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
margin-bottom:12px;
font-size:16px;
background:#0f2f68;
color:white;
}

.button{
width:100%;
padding:15px;
border-radius:30px;
border:none;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.btn-save{
background:#2ecc71;
color:white;
}

.btn-clear{
background:#34495e;
color:white;
}

.btn-delete{
background:#ff5a7b;
color:white;
margin-top:8px;
}

.lesson{
background:#0f2f68;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">
Madaris AI | إدارة الجدول
</div>

<div class="subtitle">
إضافة وتعديل الحصص المدرسية
</div>

<h3 data-school-name>
جاري التحميل...
</h3>

<div>
schoolId :
<span data-school-id></span>
</div>

<button
class="button"
onclick="location.href='index.html'">

رجوع للوحة المدرسة

</button>

<button
class="button btn-delete"
data-action="logout">

خروج

</button>

</div>


<div class="card">

<div class="title">
إضافة / تعديل حصة
</div>

<select id="class"
class="input">
<option value="">اختر الصف</option>
</select>

<select id="subject"
class="input">
<option value="">اختر المادة</option>
</select>

<select id="teacher"
class="input">
<option value="">اختر المعلم</option>
</select>

<select id="day"
class="input">

<option value="">اختر اليوم</option>

<option>السبت</option>
<option>الأحد</option>
<option>الإثنين</option>
<option>الثلاثاء</option>
<option>الأربعاء</option>
<option>الخميس</option>

</select>

<input
id="period"
class="input"
placeholder="رقم الحصة"
/>

<input
id="start"
class="input"
type="time"
/>

<input
id="end"
class="input"
type="time"
/>

<textarea
id="note"
class="input"
placeholder="ملاحظة"
></textarea>


<button
class="button btn-save"
onclick="saveLesson()">

حفظ الحصة

</button>


<button
class="button btn-clear"
onclick="clearForm()">

تفريغ النموذج

</button>

</div>


<div class="card">

<div class="title">
الحصص الحالية
</div>

<div id="lessons">

جاري التحميل...

</div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAzQKhPMSZNevhb6LlNh9pt9yA4Au9G7Cw",
authDomain: "madaris-ai.firebaseapp.com",
projectId: "madaris-ai",
storageBucket: "madaris-ai.firebasestorage.app",
messagingSenderId: "915394447224",
appId: "1:915394447224:web:3d7750a7fcd3f41bedaa8d"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function loadDropdowns(){

const session =
window.MadarisSchoolSession.getSchoolSession();

const schoolId = session.schoolId;

const classSnap =
await getDocs(
query(
collection(db,"classes"),
where("schoolId","==",schoolId)
)
);

classSnap.forEach(doc=>{

const data = doc.data();

document
.getElementById("class")
.innerHTML+=
`<option value="${data.name}">
${data.name}
</option>`

});


const subjectSnap =
await getDocs(
query(
collection(db,"subjects"),
where("schoolId","==",schoolId)
)
);

subjectSnap.forEach(doc=>{

const data = doc.data();

document
.getElementById("subject")
.innerHTML+=
`<option value="${data.name}">
${data.name}
</option>`

});


const teacherSnap =
await getDocs(
query(
collection(db,"teachers"),
where("schoolId","==",schoolId)
)
);

teacherSnap.forEach(doc=>{

const data = doc.data();

document
.getElementById("teacher")
.innerHTML+=
`<option value="${data.name}">
${data.name}
</option>`

});

}
 async function saveLesson(){

const session =
window.MadarisSchoolSession.getSchoolSession();

const schoolId =
session.schoolId;

await addDoc(
collection(db,"schedule"),
{

schoolId:schoolId,

className:
document.getElementById("class").value,

subjectName:
document.getElementById("subject").value,

teacherName:
document.getElementById("teacher").value,

day:
document.getElementById("day").value,

period:
document.getElementById("period").value,

startTime:
document.getElementById("start").value,

endTime:
document.getElementById("end").value,

note:
document.getElementById("note").value

}
);

loadLessons();

clearForm();

}



function clearForm(){

document
.querySelectorAll(".input")
.forEach(i=>i.value="");

}



async function loadLessons(){

const session =
window.MadarisSchoolSession.getSchoolSession();

const schoolId =
session.schoolId;

const snap =
await getDocs(
query(
collection(db,"schedule"),
where("schoolId","==",schoolId)
)
);

const container =
document.getElementById("lessons");

container.innerHTML="";

snap.forEach(doc=>{

const d = doc.data();

const el =
document.createElement("div");

el.className="lesson";

el.innerHTML=`

<div>
${d.subjectName}
</div>

<div>
${d.className}
</div>

<div>
${d.teacherName}
</div>

<div>
${d.day}
${d.startTime}
-
${d.endTime}
</div>

<button
class="btn-delete"
onclick="deleteLesson('${doc.id}')">

حذف

</button>

`;

container.appendChild(el);

});

}


async function deleteLesson(id){

await deleteDoc(
doc(db,"schedule",id)
);

loadLessons();

}


loadDropdowns();
loadLessons();

</script>


<script src="./session-guard.js"></script>

</body>

</html>
