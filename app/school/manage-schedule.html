<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة الجدول | Madaris AI</title>

<link rel="stylesheet" href="/assets/css/dashboard.css">

<style>

body {
background: linear-gradient(180deg,#0f2c6b,#061642);
color: white;
font-family: Tahoma, Arial;
margin:0;
padding:0;
}

.container {
max-width:1000px;
margin:auto;
padding:20px;
}

.card {
background: rgba(255,255,255,0.06);
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.title {
font-size:28px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.subtitle {
text-align:center;
opacity:.8;
margin-bottom:20px;
}

.grid {
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.stat {
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:20px;
text-align:center;
}

.stat h2 {
font-size:35px;
margin:0;
}

button {
width:100%;
padding:15px;
border-radius:20px;
border:none;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.btn-primary {
background:linear-gradient(45deg,#36d1dc,#5b86e5);
color:white;
}

.btn-danger {
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
}

.form-group {
margin-top:15px;
}

label {
display:block;
margin-bottom:5px;
opacity:.8;
}

select,input,textarea {
width:100%;
padding:15px;
border-radius:15px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
}

textarea {
height:80px;
}

.save-btn {
background:linear-gradient(45deg,#00c853,#64dd17);
}

.clear-btn {
background:linear-gradient(45deg,#546e7a,#37474f);
}

.schedule-list {
margin-top:30px;
}

.schedule-item {
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.delete-btn {
background:red;
padding:5px 10px;
border-radius:10px;
font-size:12px;
float:left;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">Madaris AI | إدارة الجدول</div>

<div class="subtitle">
إضافة وتعديل وحذف الحصص داخل المدرسة الحالية
</div>

<div id="schoolName"></div>

<button class="btn-primary" onclick="goDashboard()">رجوع لوحة المدرسة</button>
<button class="btn-danger" onclick="logout()">خروج</button>

</div>


<div class="card">

<div class="grid">

<div class="stat">
<h2 id="subjectsCount">0</h2>
المواد
</div>

<div class="stat">
<h2 id="classesCount">0</h2>
الصفوف
</div>

<div class="stat">
<h2 id="teachersCount">0</h2>
المعلمين
</div>

<div class="stat">
<h2 id="scheduleCount">0</h2>
الحصص
</div>

</div>

</div>


<div class="card">

<h2>إضافة / تعديل حصة</h2>

<div class="form-group">
<label>الصف</label>
<select id="classSelect"></select>
</div>

<div class="form-group">
<label>المادة</label>
<select id="subjectSelect"></select>
</div>

<div class="form-group">
<label>المعلم</label>
<select id="teacherSelect"></select>
</div>

<div class="form-group">
<label>اليوم</label>
<select id="daySelect">

<option value="السبت">السبت</option>
<option value="الأحد">الأحد</option>
<option value="الاثنين">الاثنين</option>
<option value="الثلاثاء">الثلاثاء</option>
<option value="الأربعاء">الأربعاء</option>

</select>
</div>

<div class="form-group">
<label>رقم الحصة</label>
<input id="periodInput" type="number">
</div>

<div class="form-group">
<label>من</label>
<input id="fromTime" type="time">
</div>

<div class="form-group">
<label>إلى</label>
<input id="toTime" type="time">
</div>

<div class="form-group">
<label>ملاحظة</label>
<textarea id="noteInput"></textarea>
</div>

<button class="save-btn" onclick="saveSchedule()">حفظ الحصة</button>
<button class="clear-btn" onclick="clearForm()">تفريغ النموذج</button>

</div>


<div class="card">

<h2>الحصص الحالية</h2>

<div id="scheduleList" class="schedule-list"></div>

</div>


<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_SENDER",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let schoolId = localStorage.getItem("schoolId");
  async function loadClasses(){

const snapshot = await getDocs(collection(db,"classes"));

let html = "<option>اختر الصف</option>";

snapshot.forEach(doc=>{

let data = doc.data();

if(data.schoolId === schoolId){

html += `<option value="${doc.id}">${data.name}</option>`;

}

});

document.getElementById("classSelect").innerHTML = html;

document.getElementById("classesCount").innerText = snapshot.size;

}



async function loadSubjects(){

const snapshot = await getDocs(collection(db,"subjects"));

let html = "<option>اختر المادة</option>";

snapshot.forEach(doc=>{

let data = doc.data();

html += `<option value="${doc.id}">${data.name}</option>`;

});

document.getElementById("subjectSelect").innerHTML = html;

document.getElementById("subjectsCount").innerText = snapshot.size;

}



async function loadTeachers(){

const snapshot = await getDocs(collection(db,"teachers"));

let html = "<option>اختر المعلم</option>";

snapshot.forEach(doc=>{

let data = doc.data();

html += `<option value="${doc.id}">${data.name}</option>`;

});

document.getElementById("teacherSelect").innerHTML = html;

document.getElementById("teachersCount").innerText = snapshot.size;

}



async function saveSchedule(){

let classId = document.getElementById("classSelect").value;
let subjectId = document.getElementById("subjectSelect").value;
let teacherId = document.getElementById("teacherSelect").value;
let day = document.getElementById("daySelect").value;
let period = document.getElementById("periodInput").value;
let from = document.getElementById("fromTime").value;
let to = document.getElementById("toTime").value;
let note = document.getElementById("noteInput").value;

if(!classId || !subjectId || !teacherId){
alert("اكمل البيانات");
return;
}

await addDoc(collection(db,"schedules"),{

schoolId,
classId,
subjectId,
teacherId,
day,
period,
from,
to,
note,
createdAt:Date.now()

});

clearForm();

loadSchedules();

}



function clearForm(){

document.getElementById("periodInput").value="";
document.getElementById("noteInput").value="";

}



async function loadSchedules(){

const snapshot = await getDocs(collection(db,"schedules"));

let html = "";

let count = 0;

snapshot.forEach(doc=>{

let data = doc.data();

if(data.schoolId === schoolId){

count++;

html += `

<div class="schedule-item">

<div>اليوم : ${data.day}</div>

<div>الحصة : ${data.period}</div>

<div>من : ${data.from}</div>

<div>إلى : ${data.to}</div>

<button class="delete-btn" onclick="deleteSchedule('${doc.id}')">حذف</button>

</div>

`;

}

});

document.getElementById("scheduleList").innerHTML = html;

document.getElementById("scheduleCount").innerText = count;

}



async function deleteSchedule(id){

if(!confirm("حذف الحصة ؟")) return;

await deleteDoc(doc(db,"schedules",id));

loadSchedules();

}



function goDashboard(){

location.href="index.html";

}



function logout(){

localStorage.clear();

location.href="../login.html";

}



loadClasses();
loadSubjects();
loadTeachers();
loadSchedules();

</script>

</body>
</html>
