<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المعلمين | Madaris AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div style="background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 24px; border: 1px solid #d4af37; width: 90%; max-width: 450px; text-align: center;">
        <img src="logo.png" alt="Logo" style="width: 80px; margin-bottom: 20px;">
        <h2 style="color: #d4af37;">بوابة المعلم الذكي</h2>
        <p style="color: #a0aec0; margin-bottom: 30px;">انضم لخبراء التعليم الرقمي في اليمن</p>
        <form style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" placeholder="الاسم الكامل" style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: right;">
            <input type="text" placeholder="التخصص الدراسي" style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: right;">
            <input type="email" placeholder="البريد الإلكتروني" style="padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: right;">
            <button type="button" class="cta-button" style="border: none; cursor: pointer; background: linear-gradient(45deg, #d4af37, #b8860b);">تقديم طلب الانضمام</button>
        </form>
        <a href="index.html" style="color: #d4af37; text-decoration: none; font-size: 0.9rem; display: block; margin-top: 15px;">العودة للرئيسية</a>
    </div>
</body>
</html>
