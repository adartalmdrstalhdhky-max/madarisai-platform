<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل طالب | Madaris AI</title>
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #112240; padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; width: 85%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #1e293b; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #00d2ff; border: none; border-radius: 10px; color: #050a18; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" style="width: 80px; margin-bottom: 15px;">
        <h2>انضم إلينا</h2>
        <input type="text" id="name" placeholder="الاسم الكامل">
        <input type="text" id="level" placeholder="الصف الدراسي">
        <button class="btn" onclick="save()">إنشاء حساب</button>
        <br><br>
        <a href="index.html" style="color: #64748b; text-decoration: none;">إلغاء</a>
    </div>
    <script src="database.js"></script>
    <script>
        function save() {
            const n = document.getElementById('name').value;
            const l = document.getElementById('level').value;
            if(n && l) {
                if(window.MadarisDB) MadarisDB.saveStudent(n, l);
                alert('تم التسجيل بنجاح!');
                window.location.href = 'dashboard.html';
            } else { alert('أكمل البيانات'); }
        }
    </script>
</body>
</html>
