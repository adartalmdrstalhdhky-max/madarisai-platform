<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة | Madaris AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #112240; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: #00d2ff; color: #050a18; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 15px; border-top: 4px solid #d4af37; }
    </style>
</head>
<body style="background: #050a18; padding: 30px;">

    <div style="max-width: 1000px; margin: auto;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h2 style="color: #00d2ff;"><i class="fas fa-user-shield"></i> لوحة تحكم المدير (عصام)</h2>
            <img src="logo.png" style="height: 50px;">
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div class="stat-card">
                <h3>إجمالي الطلاب</h3>
                <p id="total-students" style="font-size: 2rem; color: #d4af37;">0</p>
            </div>
            <div class="stat-card" style="border-top-color: #00ff00;">
                <h3>حالة السيرفر المحلي</h3>
                <p style="color: #00ff00;">نشط (Offline Ready)</p>
            </div>
        </div>

        <h3 style="color: white;">قائمة الطلاب المسجلين</h3>
        <table id="students-table">
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>المستوى</th>
                    <th>النقاط المحققة</th>
                    <th>تاريخ الانضمام</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        
        <div style="margin-top: 30px;">
            <button onclick="window.print()" class="cta-button" style="background: #4a5568;">طباعة تقرير رسمي</button>
            <a href="index.html" style="color: #a0aec0; margin-right: 20px; text-decoration: none;">العودة للموقع</a>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        // دالة لجلب وعرض البيانات حقيقياً من ذاكرة المتصفح
        function loadAdminData() {
            const user = MadarisDB.getStudent();
            const tableBody = document.getElementById('table-body');
            const totalStudents = document.getElementById('total-students');

            if(user) {
                totalStudents.innerText = "1"; // حالياً يعرض المستخدم الحالي، وسنطوره ليعرض الجميع لاحقاً
                const row = `<tr>
                    <td>${user.name}</td>
                    <td>${user.level}</td>
                    <td style="color: #00d2ff; font-weight: bold;">${user.progress}</td>
                    <td>${new Date(user.joinedAt).toLocaleDateString('ar-YE')}</td>
                </tr>`;
                tableBody.innerHTML = row;
            } else {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد طلاب مسجلين حالياً</td></tr>';
            }
        }

        loadAdminData();
    </script>
</body>
</html>
